<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Text Tool</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .main-card {
            background: white;
            width: 100%;
            max-width: 700px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 { color: #333; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(74,144,226,0.2); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
        }

        .stat-box span { display: block; font-weight: bold; color: var(--primary); font-size: 18px; }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .copy-btn { background: #28a745; }
        .clear-btn { background: #dc3545; }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Smart Text Analyzer</h2>
    
    <textarea id="mainText" placeholder="Matningizni shu yerga kiriting yoki nusxalab qo'ying..." oninput="analyzeText()"></textarea>

    <div class="stats-grid">
        <div class="stat-box">Belgilar <span id="charCount">0</span></div>
        <div class="stat-box">So'zlar <span id="wordCount">0</span></div>
        <div class="stat-box">O'qish vaqti <span id="readTime">0</span> m.</div>
    </div>

    <div class="btn-group">
        <button onclick="transform('upper')">HAMMASI KATTA</button>
        <button onclick="transform('lower')">hammasi kichik</button>
        <button onclick="transform('clean')">Bo'shliqlarni tozalash</button>
        <button class="copy-btn" onclick="copyText()">Nusxa olish</button>
        <button class="clear-btn" onclick="clearAll()">Tozalash</button>
    </div>
</div>

<script>
    const textInput = document.getElementById('mainText');

    function analyzeText() {
        const text = textInput.value.trim();
        
        // Belgilar soni
        document.getElementById('charCount').innerText = text.length;

        // So'zlar soni
        const words = text ? text.split(/\s+/).length : 0;
        document.getElementById('wordCount').innerText = words;

        // O'rtacha o'qish vaqti (daqiqada) - 1 daqiqada 200 so'z
        const time = Math.ceil(words / 200);
        document.getElementById('readTime').innerText = text ? time : 0;
    }

    function transform(type) {
        if (type === 'upper') textInput.value = textInput.value.toUpperCase();
        if (type === 'lower') textInput.value = textInput.value.toLowerCase();
        if (type === 'clean') textInput.value = textInput.value.replace(/\s+/g, ' ').trim();
        analyzeText();
    }

    function copyText() {
        textInput.select();
        document.execCommand('copy');
        alert("Matn nusxalandi!");
    }

    function clearAll() {
        textInput.value = "";
        analyzeText();
    }
</script>

</body>
</html>
